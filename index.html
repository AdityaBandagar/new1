
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aditya Bandagar | Portfolio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* PARTICLES BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* CUSTOM CURSOR */

.cursor{
width:15px;
height:15px;
border:2px solid #38bdf8;
border-radius:50%;
position:fixed;
pointer-events:none;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.6);
}

.logo{
color:#38bdf8;
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
color:white;
text-decoration:none;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero img{
width:150px;
height:150px;
border-radius:50%;
border:4px solid #38bdf8;
margin-bottom:10px;
}

.hero h1{
font-size:42px;
}

.hero span{
color:#38bdf8;
}

.typing{
color:#94a3b8;
}

/* SECTION */

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:15px;
margin:60px auto;
max-width:900px;
backdrop-filter:blur(10px);
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}

.skill{
background:#1e293b;
padding:10px 20px;
border-radius:20px;
}

/* PROJECT SLIDER */

.slider{
position:relative;
max-width:700px;
margin:auto;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:10px;
}

/* CHATBOT */

.chat-btn{
position:fixed;
bottom:20px;
right:20px;
background:#38bdf8;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.chatbox{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:#020617;
border-radius:10px;
display:none;
flex-direction:column;
}

.chat-header{
background:#38bdf8;
padding:10px;
color:black;
}

.chat-body{
height:200px;
overflow:auto;
padding:10px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
}

.chat-input button{
background:#38bdf8;
border:none;
padding:8px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="cursor" id="cursor"></div>

<!-- NAVBAR -->

<nav>

<div class="logo">Aditya</div>

<ul>
<li><a href="#about">About</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#projects">Projects</a></li>
</ul>

</nav>

<!-- HERO -->

<div class="hero">

<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">

<h1>Hello I'm <span>Aditya</span></h1>

<p class="typing"></p>

</div>

<!-- ABOUT -->

<div class="card" id="about">

<h2 style="text-align:center;color:#38bdf8">About Me</h2>

<p style="text-align:center">
Aditya Bandagar <br>
Computer Engineering Student <br>
Satara Polytechnic Satara
</p>

</div>

<!-- SKILLS -->

<div class="card" id="skills">

<h2 style="text-align:center;color:#38bdf8">Skills</h2>

<div class="skills">

<div class="skill">C</div>
<div class="skill">C++</div>
<div class="skill">HTML</div>
<div class="skill">Java</div>
<div class="skill">Web Design</div>

</div>

</div>

<!-- PROJECT SLIDER BMW -->

<div class="card" id="projects">

<h2 style="text-align:center;color:#38bdf8">BMW Gallery</h2>

<div class="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1493238792000-8113da705763">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c">
</div>

</div>

</div>

<footer>

<p>© 2026 Aditya Bandagar</p>

</footer>

<!-- CHATBOT -->

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chatbox" id="chat">

<div class="chat-header">AI Chat</div>

<div class="chat-body" id="chatBody">
<p>Hello 👋</p>
</div>

<div class="chat-input">

<input id="msg">

<button onclick="send()">Send</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

/* PARTICLES */

particlesJS("particles-js",{
particles:{
number:{value:80},
size:{value:3},
color:{value:"#38bdf8"},
line_linked:{enable:true}
}
});

/* TYPING */

const text="Web Developer | Programmer | Student";

let i=0;

function typing(){

if(i<text.length){

document.querySelector(".typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,80);

}

}

typing();

/* CURSOR */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{

cursor.style.top=e.clientY+"px";

cursor.style.left=e.clientX+"px";

});

/* SLIDER */

let slides=document.getElementsByClassName("slide");

let index=0;

function showSlides(){

for(let i=0;i<slides.length;i++){

slides[i].style.display="none";

}

index++;

if(index>slides.length){index=1}

slides[index-1].style.display="block";

setTimeout(showSlides,3000);

}

showSlides();

/* CHAT */

function toggleChat(){

let c=document.getElementById("chat");

c.style.display=c.style.display==="flex"?"none":"flex";

}

function send(){

let msg=document.getElementById("msg").value;

let body=document.getElementById("chatBody");

body.innerHTML+="<p>You: "+msg+"</p>";

body.innerHTML+="<p>Bot: Nice 👍</p>";

}

</script>

</body>
</html>
